<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naive Bayes — Word Likelihood</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

    :root {
      --bg:#f8f7f4;
      --bg2:#f0ede8;
      --border:#d8d3c8;
      --text:#1a1814;
      --text2:#6b6560;
      --text3:#9b958e;
      --green:#1D9E75;
      --green-bg:#E1F5EE;
      --green-dark:#085041;
      --red:#E24B4A;
      --red-bg:#FCEBEB;
      --red-dark:#791F1F;
      --purple:#534AB7;
      --purple-bg:#EEEDFE;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    .demo-box {
      background: var(--bg2);
      border: .5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      font-family: 'IBM Plex Sans', sans-serif;
      max-width: 760px;
    }

    .prob-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg);
      border: .5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .prob-table th,
    .prob-table td {
      padding: 8px 10px;
      border-bottom: .5px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    .prob-table tr:last-child td {
      border-bottom: none;
    }

    .prob-table th {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: var(--bg2);
    }

    .word-cell {
      font-weight: 500;
      color: var(--text);
    }

    .spam-cell {
      color: var(--red-dark);
      white-space: nowrap;
    }

    .ham-cell {
      color: var(--green-dark);
      white-space: nowrap;
    }

    .bar-wrap {
      display: inline-block;
      width: 70px;
      height: 6px;
      background: #ddd7ce;
      border-radius: 999px;
      margin-right: 6px;
      vertical-align: middle;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .bar-spam {
      background: var(--red);
    }

    .bar-ham {
      background: var(--green);
    }

    .run-row {
      margin-top: 12px;
    }

    .btn {
      border: .5px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
    }

    .btn:hover {
      background: var(--purple-bg);
      border-color: var(--purple);
    }

    .chain-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .chain-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chain-step {
      background: var(--bg);
      border: .5px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chain-op {
      color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
    }

    .cs-word {
      font-size: 11px;
      color: var(--text2);
    }

    .cs-prob {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
    }

    .chain-result {
      font-size: 12px;
      color: var(--text2);
      margin-top: 6px;
    }

    @media (max-width: 520px) {
      .demo-box {
        padding: 12px;
      }

      .prob-table th,
      .prob-table td {
        padding: 7px 8px;
      }

      .bar-wrap {
        width: 44px;
      }
    }
  </style>
</head>

<body>
  <div class="demo-box">
    <table class="prob-table">
      <thead>
        <tr>
          <th>Từ</th>
          <th>P(từ | spam)</th>
          <th>P(từ | ham)</th>
        </tr>
      </thead>

      <tbody id="wordTable">
        <tr>
          <td class="word-cell">trúng</td>
          <td class="spam-cell">
            <div class="bar-wrap"><div class="bar-fill bar-spam" style="width:82%"></div></div>
            82%
          </td>
          <td class="ham-cell">
            <div class="bar-wrap"><div class="bar-fill bar-ham" style="width:4%"></div></div>
            4%
          </td>
        </tr>

        <tr>
          <td class="word-cell">thưởng</td>
          <td class="spam-cell">
            <div class="bar-wrap"><div class="bar-fill bar-spam" style="width:76%"></div></div>
            76%
          </td>
          <td class="ham-cell">
            <div class="bar-wrap"><div class="bar-fill bar-ham" style="width:3%"></div></div>
            3%
          </td>
        </tr>

        <tr>
          <td class="word-cell">miễn phí</td>
          <td class="spam-cell">
            <div class="bar-wrap"><div class="bar-fill bar-spam" style="width:68%"></div></div>
            68%
          </td>
          <td class="ham-cell">
            <div class="bar-wrap"><div class="bar-fill bar-ham" style="width:12%"></div></div>
            12%
          </td>
        </tr>

        <tr>
          <td class="word-cell">click</td>
          <td class="spam-cell">
            <div class="bar-wrap"><div class="bar-fill bar-spam" style="width:71%"></div></div>
            71%
          </td>
          <td class="ham-cell">
            <div class="bar-wrap"><div class="bar-fill bar-ham" style="width:18%"></div></div>
            18%
          </td>
        </tr>

        <tr>
          <td class="word-cell">triệu</td>
          <td class="spam-cell">
            <div class="bar-wrap"><div class="bar-fill bar-spam" style="width:59%"></div></div>
            59%
          </td>
          <td class="ham-cell">
            <div class="bar-wrap"><div class="bar-fill bar-ham" style="width:8%"></div></div>
            8%
          </td>
        </tr>
      </tbody>
    </table>

    <div class="run-row">
      <button class="btn" id="shuffleBtn" type="button">↺ Xáo trộn ví dụ</button>
    </div>

    <div style="margin-top:12px">
      <div class="chain-title">
        ∏ P(wᵢ | spam) — 3 từ đầu tiên:
      </div>

      <div class="chain-steps" id="chainSteps">
        <div class="chain-step">
          <span class="cs-word">trúng</span>
          <span class="cs-prob" style="color:var(--red-dark)">82%</span>
        </div>

        <span class="chain-op">×</span>

        <div class="chain-step">
          <span class="cs-word">thưởng</span>
          <span class="cs-prob" style="color:var(--red-dark)">76%</span>
        </div>

        <span class="chain-op">×</span>

        <div class="chain-step">
          <span class="cs-word">miễn phí</span>
          <span class="cs-prob" style="color:var(--red-dark)">68%</span>
        </div>

        <span class="chain-op">=</span>

        <div class="chain-step" style="background:var(--red-bg);border-color:#e8aaaa;">
          <span class="cs-word" style="color:var(--red-dark)">∏ P(wᵢ|spam)</span>
          <span class="cs-prob" style="color:var(--red-dark)">42.38%</span>
        </div>
      </div>

      <div class="chain-result" id="chainResult">
        Tích 3 xác suất = 42.38% — con số nhỏ dần khi thêm từ, đây là lý do cần hiệu chỉnh Laplace.
      </div>
    </div>
  </div>

  <script>
    const words = [
      { word: "trúng", spam: 82, ham: 4 },
      { word: "thưởng", spam: 76, ham: 3 },
      { word: "miễn phí", spam: 68, ham: 12 },
      { word: "click", spam: 71, ham: 18 },
      { word: "triệu", spam: 59, ham: 8 },
      { word: "khuyến mãi", spam: 74, ham: 15 },
      { word: "nhận ngay", spam: 69, ham: 10 },
      { word: "voucher", spam: 64, ham: 14 },
      { word: "họp", spam: 6, ham: 62 },
      { word: "báo cáo", spam: 9, ham: 58 },
      { word: "dự án", spam: 11, ham: 66 },
      { word: "lịch", spam: 8, ham: 54 },
      { word: "tài liệu", spam: 10, ham: 61 }
    ];

    const wordTable = document.getElementById("wordTable");
    const chainSteps = document.getElementById("chainSteps");
    const chainResult = document.getElementById("chainResult");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function shuffleArray(array) {
      const copiedArray = [...array];

      for (let i = copiedArray.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [copiedArray[i], copiedArray[randomIndex]] = [copiedArray[randomIndex], copiedArray[i]];
      }

      return copiedArray;
    }

    function renderTable(selectedWords) {
      wordTable.innerHTML = selectedWords.map(item => `
        <tr>
          <td class="word-cell">${item.word}</td>

          <td class="spam-cell">
            <div class="bar-wrap">
              <div class="bar-fill bar-spam" style="width:${item.spam}%"></div>
            </div>
            ${item.spam}%
          </td>

          <td class="ham-cell">
            <div class="bar-wrap">
              <div class="bar-fill bar-ham" style="width:${item.ham}%"></div>
            </div>
            ${item.ham}%
          </td>
        </tr>
      `).join("");
    }

    function renderChain(selectedWords) {
      const firstThree = selectedWords.slice(0, 3);
      const product = firstThree.reduce((acc, item) => acc * (item.spam / 100), 1);
      const productPercent = (product * 100).toFixed(2);

      const chainItemsHtml = firstThree.map((item, index) => {
        const operator = index < firstThree.length - 1
          ? '<span class="chain-op">×</span>'
          : '';

        return `
          <div class="chain-step">
            <span class="cs-word">${item.word}</span>
            <span class="cs-prob" style="color:var(--red-dark)">${item.spam}%</span>
          </div>
          ${operator}
        `;
      }).join("");

      chainSteps.innerHTML = `
        ${chainItemsHtml}

        <span class="chain-op">=</span>

        <div class="chain-step" style="background:var(--red-bg);border-color:#e8aaaa;">
          <span class="cs-word" style="color:var(--red-dark)">∏ P(wᵢ|spam)</span>
          <span class="cs-prob" style="color:var(--red-dark)">${productPercent}%</span>
        </div>
      `;

      chainResult.textContent =
        `Tích 3 xác suất = ${productPercent}% — con số nhỏ dần khi thêm từ, đây là lý do cần hiệu chỉnh Laplace.`;
    }

    function shuffleWords() {
      const selectedWords = shuffleArray(words).slice(0, 5);
      renderTable(selectedWords);
      renderChain(selectedWords);
    }

    shuffleBtn.addEventListener("click", shuffleWords);
  </script>
</body>
</html>
